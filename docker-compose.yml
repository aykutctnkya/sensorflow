version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sensorflow
      POSTGRES_USER: sensorflow_user
      POSTGRES_PASSWORD: sensorflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - c:/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  web:
    build: .
    command: daphne -p 8000 -b 0.0.0.0 sensorflow.asgi:application
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mosquitto
    environment:
      - DJANGO_SETTINGS_MODULE=sensorflow.settings
      - POSTGRES_DB=sensorflow
      - POSTGRES_USER=sensorflow_user
      - POSTGRES_PASSWORD=sensorflow_pass
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

  mqtt_subscriber:
    build: .
    command: python -m devices.mqtt
    depends_on:
      - postgres
      - mosquitto
    environment:
      - DJANGO_SETTINGS_MODULE=sensorflow.settings
      - POSTGRES_DB=sensorflow
      - POSTGRES_USER=sensorflow_user
      - POSTGRES_PASSWORD=sensorflow_pass
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

volumes:
  postgres_data: